// ================= منطق العرض =================
let currentQuiz = [];
let index = 0;

function startQuiz(name){
  currentQuiz = quizzes[name];
  index = 0;
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="block";
  showQuestion();
}

function showQuestion(){
  if(index >= currentQuiz.length){
    document.getElementById("question").innerText="انتهت المسابقة 🎉";
    document.getElementById("options").innerHTML="";
    return;
  }
  document.getElementById("answer").innerText="";
  document.getElementById("question").innerText=currentQuiz[index].q;
  let opts = currentQuiz[index].options.map(o=>`<div class="option" onclick="checkAnswer('${o}')">${o}</div>`).join("");
  document.getElementById("options").innerHTML=opts;
}

function checkAnswer(selected){
  if(selected===currentQuiz[index].a){
    document.getElementById("answer").innerText="✅ إجابة صحيحة!";
  }else{
    document.getElementById("answer").innerText="❌ إجابة خاطئة! الإجابة الصحيحة: "+currentQuiz[index].a;
  }
}

function nextQuestion(){
  index++;
  showQuestion();
}

function backHome(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("home").style.display="block";
}

</script>
