let currentCategory = '';
let currentIndex = 0;

function startQuiz(category){
  currentCategory = category;
  currentIndex = 0;
  document.getElementById('home').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('categoryTitle').textContent = category==='religious'?"🕌 الأسئلة الدينية":category==='geography'?"🌍 أسئلة جغرافيا ودول":"🧠 أسئلة عامة";
  document.getElementById('showQuestionBtn').style.display='inline-block';
  document.getElementById('question').style.display='none';
  document.getElementById('showAnswerBtn').style.display='none';
  document.getElementById('answer').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

function showQuestionFunc(){
  document.getElementById('question').textContent = quizzes[currentCategory][currentIndex].q;
  document.getElementById('question').style.display='block';
  document.getElementById('showAnswerBtn').style.display='inline-block';
  document.getElementById('showQuestionBtn').style.display='none';
}

function revealAnswer(){
  document.getElementById('answer').textContent = quizzes[currentCategory][currentIndex].a;
  document.getElementById('answer').style.display='block';
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('showAnswerBtn').style.display='none';
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex<quizzes[currentCategory].length){
    document.getElementById('question').style.display='none';
    document.getElementById('answer').style.display='none';
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('showAnswerBtn').style.display='none';
    document.getElementById('showQuestionBtn').style.display='inline-block';
  }else{
    alert("انتهت الأسئلة في هذا الكاتقوري!");
    backToCategories();
  }
}

function backToCategories(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('home').style.display='block';
}
