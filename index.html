let currentCategory="";
let currentIndex=0;

function startQuiz(cat){
currentCategory=cat;
currentIndex=0;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

showQuestion();
}

function showQuestion(){

let q=quizzes[currentCategory][currentIndex];

document.getElementById("question").innerText=q.q;
document.getElementById("options").style.display="none";
document.getElementById("options").innerHTML="";
document.getElementById("answer").innerHTML="";

}

function showOptions(){

let q=quizzes[currentCategory][currentIndex];
let opts=shuffle([...q.options]);

let html="";

opts.forEach(o=>{
html+=`<div class="option">${o}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("options").style.display="block";

}

function showAnswer(){

let a=quizzes[currentCategory][currentIndex].a;

document.getElementById("answer").innerHTML="الإجابة: "+a;

}

function nextQuestion(){

currentIndex++;

if(currentIndex>=quizzes[currentCategory].length){

alert("انتهت الأسئلة");

backHome();

return;

}

showQuestion();

}

function backHome(){
