function startQuiz(category){
  currentCategory = category;
  currentIndex = 0;
  document.getElementById('home').style.display='none';
  document.getElementById('quiz').style.display='block';
  showQuestion();
}

function showQuestion(){
  const qObj = quizzes[currentCategory][currentIndex];
  document.getElementById('question').textContent = qObj.q;
  document.getElementById('answer').textContent = qObj.a;
  document.getElementById('answer').style.display='none';
  document.getElementById('showAnswer').style.display='inline-block';
  document.getElementById('nextBtn').style.display='none';
}

function revealAnswer(){
  document.getElementById('answer').style.display='block';
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('showAnswer').style.display='none';
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex<quizzes[currentCategory].length){
    showQuestion();
  }else{

    backToCategories();
  }
}

function backToCategories(){
  document.getElementById('quiz').style.display='none';
