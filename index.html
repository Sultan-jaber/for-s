<!DOCTYPE html>

<style>
body { font-family: Arial, sans-serif; direction: rtl; background-color: orange; margin:0; padding:0; text-align:center; }
#home {
  position: absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
h1 { font-size: 60px; color:black; margin-bottom: 10px; }
#subtitle { font-size: 28px; color:black; margin-bottom: 40px; }
.categories { display: flex; gap: 40px; flex-wrap: nowrap; }
.category { padding: 40px 50px; border: 2px solid black; border-radius: 15px; font-size:32px; cursor:pointer; background-color:white; color:black; }
button { margin-top: 20px; padding: 14px 24px; font-size: 26px; cursor: pointer; background-color: #3498db; color: white; border:none; border-radius: 10px; }
#quiz {
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  justify-content:center; 
  text-align:center; 
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
}
#question { font-size:36px; margin-top:40px; color:black; text-align:center; }
.options { margin-top:20px; display:flex; flex-direction:column; gap:15px; }
.option-btn { font-size:28px; padding:10px 20px; cursor:pointer; border:none; border-radius:8px; background-color:#3498db; color:white; }
#nextBtn { display:none; }
</style>
</head>
<body>

<div id="home">
  <h1>مسابقة أسئلة وإجابات</h1>
  <div id="subtitle">من إعداد sułtan⚡️ - ميم⚡️<br>Server: Alva</div>
  <div class="categories">
    <div class="category" onclick="startQuiz('religious')">🕌 الأسئلة الدينية</div>
    <div class="category" onclick="startQuiz('geography')">🌍 أسئلة جغرافيا ودول</div>
    <div class="category" onclick="startQuiz('general')">🧠 أسئلة عامة</div>
  </div>
</div>

<div id="quiz">

<div style="display:flex; gap:20px;">

  <button id="showAnswerBtn" onclick="showAnswerFunc()">أظهر الإجابة</button>

<div id="question"></div>
<div class="options" id="options"></div>
<button id="nextBtn" onclick="nextQuestion()">السؤال التالي</button>
<br>

function shuffle(array){ 
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1)); 
    [array[i],array[j]]=[array[j],array[i]];
  } 
  return array; 
}

let currentCategory = '';
let currentIndex = 0;

function startQuiz(category){
  currentCategory = category;
  currentIndex = 0;
  document.getElementById('home').style.display='none';
  document.getElementById('quiz').style.display='flex';
  document.getElementById('categoryTitle').textContent = category==='religious'?"🕌 الأسئلة الدينية":category==='geography'?"🌍 أسئلة جغرافيا ودول":"🧠 أسئلة عامة";
  document.getElementById('question').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

function showQuestionFunc(){
  const currentQ = quizzes[currentCategory][currentIndex];
  document.getElementById('question').textContent = currentQ.q;
  document.getElementById('question').style.display='block';
  document.getElementById('options').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

function showOptionsFunc(){
  const currentQ = quizzes[currentCategory][currentIndex];
  let options = [currentQ.a];
  while(options.length<3){
    let pool = quizzes[currentCategory].map(x=>x.a);
    let choice = pool[Math.floor(Math.random()*pool.length)];
    if(!options.includes(choice)) options.push(choice);
  }
  options = shuffle(options);
  
  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';
  options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.className='option-btn';
    btn.onclick = ()=>checkAnswer(opt, currentQ.a);
    optionsDiv.appendChild(btn);
  });
  optionsDiv.style.display='flex';
}

function showAnswerFunc(){
  const currentQ = quizzes[currentCategory][currentIndex];
  alert("الإجابة الصحيحة: " + currentQ.a);
  document.getElementById('nextBtn').style.display='inline-block';
}

function checkAnswer(selected, correct){
  if(selected===correct) alert("✅ إجابة صحيحة!");
  else alert("❌ إجابة خاطئة! الإجابة الصحيحة: "+correct);
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex<quizzes[currentCategory].length){
    document.getElementById('question').style.display='none';
    document.getElementById('options').style.display='none';
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('showQuestionBtn').style.display='inline-block';
  }else{
    alert("انتهت الأسئلة في هذا الكاتقوري!");
    backToCategories();
  }
}

function backToCategories(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('home').style.display='flex';
}
</script>

</body>
</html>
