<style>

.categories{display:flex;justify-content:center;gap:30px;margin-bottom:50px;flex-wrap:wrap;}
.cat{background:white;padding:25px 50px;font-size:28px;cursor:pointer;border-radius:12px;}
#quiz{display:none;}
#question{font-size:36px;margin-bottom:40px;}
button{font-size:24px;padding:15px 25px;margin:10px;cursor:pointer;}
.option{background:white;margin:15px auto;padding:15px;width:350px;border-radius:10px;font-size:24px;}

</head>
<body>

<h1>مسابقة أسئلة وإجابات</h1>
<h2>من إعداد sułtan⚡️ - ميم⚡️</h2>
<h3>Server: Alva</h3>

<div id="home">

    <div class="cat" onclick="startQuiz('religion')">🕌 الأسئلة الدينية</div>

{q:"ما اسم والد النبي إبراهيم؟",options:["آزر","إدريس","نوح"],a:"آزر"},
{q:"من هو النبي الذي تكلم في المهد؟",options:["عيسى","موسى","يونس"],a:"عيسى"},

{q:"ما اسم السورة التي تسمى قلب القرآن؟",options:["سورة يس","سورة البقرة","سورة آل عمران"],a:"سورة يس"},

{q:"ما عاصمة ألمانيا؟",options:["برلين","ميونيخ","هامبورغ"],a:"برلين"},
{q:"ما عاصمة الصين؟",options:["بكين","شنغهاي","هونغ كونغ"],a:"بكين"},
{q:"ما عاصمة البرازيل؟",options:["برازيليا","ريو دي جانيرو","ساو باولو"],a:"برازيليا"},

general: shuffle([
{q:"كم عدد أيام السنة؟",options:["365","360","366"],a:"365"},
{q:"كم عدد شهور السنة؟",options:["12","11","10"],a:"12"},
{q:"كم عدد قارات العالم؟",options:["7","6","5"],a:"7"},
{q:"كم عدد لاعبي فريق كرة القدم؟",options:["11","10","12"],a:"11"},
{q:"ما أسرع حيوان بري؟",options:["الفهد","الأسد","النمر"],a:"الفهد"},
{q:"ما أكبر حيوان على الأرض؟",options:["الحوت الأزرق","الفيل","الزرافة"],a:"الحوت الأزرق"},
{q:"ما أصغر دولة في العالم؟",options:["الفاتيكان","موناكو","مالطا"],a:"الفاتيكان"},
{q:"ما أكبر دولة عربية؟",options:["السعودية","مصر","الإمارات"],a:"السعودية"},

])
};

let currentCategory="";
let currentIndex=0;

function startQuiz(cat){
  currentCategory=cat;
  currentIndex=0;
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="block";
  showQuestion();
}

function showQuestion(){
  let q=quizzes[currentCategory][currentIndex];
  document.getElementById("question").innerText=q.q;
  document.getElementById("options").style.display="none";
  document.getElementById("options").innerHTML="";
  document.getElementById("answer").innerHTML="";
}

function showOptions(){
  let q=quizzes[currentCategory][currentIndex];
  let opts=shuffle([...q.options]);
  let html="";
  opts.forEach(o=>{html+=`<div class="option">${o}</div>`;});
  document.getElementById("options").innerHTML=html;
  document.getElementById("options").style.display="block";
}

function showAnswer(){
  let a=quizzes[currentCategory][currentIndex].a;
  document.getElementById("answer").innerHTML="الإجابة: "+a;
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex>=quizzes[currentCategory].length){
    alert("انتهت الأسئلة");
    backHome();
    return;
  }
  showQuestion();
}

function backHome(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("home").style.display="flex";
}
</script>

</body>
</html>
