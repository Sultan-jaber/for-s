<!DOCTYPE html>

<style>
body {
  font-family: Arial, sans-serif;

h1 { font-size: 36px; margin-bottom: 30px; color: #fff; text-shadow: 1px 1px 2px #000; }
.category { display: inline-block; margin: 20px; padding: 30px 40px; border-radius: 15px; font-size:24px; cursor:pointer; background-color: rgba(255, 255, 255, 0.7); transition:0.3s; }
.category:hover { background-color: rgba(255, 255, 255, 0.9); }
button { margin-top: 20px; padding: 12px 20px; font-size: 18px; cursor: pointer; background-color: #2196f3; color: white; border:none; border-radius: 8px; }
#quiz { display:none; }
#question, .answer { font-size:24px; margin-top:30px; color:#fff; text-shadow: 1px 1px 2px #000; }
.answer { display:none; color:#ffeb3b; }
#showQuestionBtn, #showAnswerBtn, #nextBtn { display:inline-block; }

</head>

<h1>مسابقة رمضان 130 سؤال</h1>
<div class="category" onclick="startQuiz('religious')">🕌 الأسئلة الدينية</div>

<div class="answer" id="answer"></div>

// خلط الأسئلة
for(let cat in quizzes){ quizzes[cat] = quizzes[cat].sort(()=> Math.random() - 0.5); }

let currentCategory = '';
let currentIndex = 0;

function startQuiz(category){
  currentCategory = category;
  currentIndex = 0;
  document.getElementById('home').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('categoryTitle').textContent = category==='religious'?"🕌 الأسئلة الدينية":category==='geography'?"🌍 أسئلة جغرافيا ودول":"🧠 أسئلة عامة";
  document.getElementById('showQuestionBtn').style.display='inline-block';
  document.getElementById('question').style.display='none';
  document.getElementById('showAnswerBtn').style.display='none';
  document.getElementById('answer').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

function showQuestionFunc(){
  document.getElementById('question').textContent = quizzes[currentCategory][currentIndex].q;
  document.getElementById('question').style.display='block';
  document.getElementById('showAnswerBtn').style.display='inline-block';
  document.getElementById('showQuestionBtn').style.display='none';
}

function revealAnswer(){
  document.getElementById('answer').textContent = quizzes[currentCategory][currentIndex].a;
  document.getElementById('answer').style.display='block';
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('showAnswerBtn').style.display='none';
}

function nextQuestion(){
  currentIndex++;
  if(currentIndex<quizzes[currentCategory].length){
    document.getElementById('question').style.display='none';
    document.getElementById('answer').style.display='none';
    document.getElementById('nextBtn').style.display='none';
    document.getElementById('showAnswerBtn').style.display='none';
    document.getElementById('showQuestionBtn').style.display='inline-block';
  }else{
    alert("انتهت الأسئلة في هذا الكاتقوري!");
    backToCategories();
  }
}

function backToCategories(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('home').style.display='block';
}
</script>

</html>
