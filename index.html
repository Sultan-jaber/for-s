for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));

}
return array;

let currentCategory="";
let currentIndex=0;

function startQuiz(cat){
currentCategory=cat;
currentIndex=0;
document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";
showQuestion();
}

function showQuestion(){
let q=quizzes[currentCategory][currentIndex];
document.getElementById("question").innerText=q.q;
document.getElementById("options").style.display="none";
document.getElementById("options").innerHTML="";
document.getElementById("answer").innerHTML="";
}

function showOptions(){
let correct=quizzes[currentCategory][currentIndex].a;
let fake=["لا شيء","غير معروف","لا أعلم","ربما"];
let options=[correct];
while(options.length<3){
let r=fake[Math.floor(Math.random()*fake.length)];
if(!options.includes(r)){
options.push(r);
}
}
options=shuffle(options);
let html="";
options.forEach(o=>{
html+=`<div class="option">${o}</div>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("options").style.display="block";
}

function showAnswer(){
let a=quizzes[currentCategory][currentIndex].a;
document.getElementById("answer").innerHTML="الإجابة: "+a;
}

function nextQuestion(){
currentIndex++;
if(currentIndex>=quizzes[currentCategory].length){
alert("انتهت الأسئلة");
backHome();
return;
}
showQuestion();
}

function backHome(){
document.getElementById("quiz").style.display="none";
document.getElementById("home").style.display="block";
}
