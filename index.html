<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>مسابقة أسئلة وإجابات</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

.container{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

#game{
display:none;
}

h1{
font-size:40px;
margin-bottom:30px;
}

button{
padding:12px 25px;
margin:10px;
font-size:20px;
cursor:pointer;
}

.question{
font-size:32px;
margin:20px;
}

.options{
margin-top:20px;
}

.option{
font-size:22px;
margin:10px;
}

.answer{
font-size:24px;
margin-top:20px;
display:none;
}

.credit{
position:fixed;
bottom:10px;
width:100%;
font-weight:bold;
}

</style>
</head>


<body>

<div id="categories" class="container">

<h1>مسابقة أسئلة وإجابات</h1>

<button onclick="startGame('religion')">🕌 الأسئلة الدينية</button>
<button onclick="startGame('geo')">🌍 أسئلة جغرافيا ودول</button>
<button onclick="startGame('general')">🧠 أسئلة عامة</button>

</div>


<div id="game" class="container">

<div id="question" class="question"></div>

<div>

<button onclick="showOptions()">عرض 3 خيارات</button>
<button onclick="showAnswer()">إظهار الإجابة</button>

</div>

<div id="options" class="options"></div>

<div id="answer" class="answer"></div>

<button onclick="nextQuestion()">السؤال التالي</button>

</div>


<div class="credit">
من إعداد sułtan⚡️ - ميم⚡️
</div>


<script>

let questions = {

religion:[

{q:"كم عدد أركان الإسلام؟",options:["5","6","4"],a:"5"},
{q:"كم عدد أركان الإيمان؟",options:["6","5","7"],a:"6"},
{q:"من هو أول نبي؟",options:["آدم","نوح","إبراهيم"],a:"آدم"},
{q:"من هو خاتم الأنبياء؟",options:["محمد","عيسى","موسى"],a:"محمد"},
{q:"كم عدد الصلوات المفروضة؟",options:["5","4","6"],a:"5"},
{q:"ما اسم والد النبي محمد؟",options:["عبد الله","عبد المطلب","أبو طالب"],a:"عبد الله"},
{q:"ما اسم زوجة النبي الأولى؟",options:["خديجة","عائشة","حفصة"],a:"خديجة"},
{q:"ما اسم الغار الذي نزل فيه الوحي؟",options:["حراء","ثور","أحد"],a:"حراء"},
{q:"ما الليلة خير من ألف شهر؟",options:["ليلة القدر","ليلة الجمعة","ليلة النصف"],a:"ليلة القدر"},
{q:"في أي شهر يصوم المسلمون؟",options:["رمضان","شعبان","محرم"],a:"رمضان"},
{q:"كم عدد سور القرآن؟",options:["114","120","110"],a:"114"},
{q:"أطول سورة في القرآن؟",options:["البقرة","النساء","آل عمران"],a:"البقرة"},
{q:"أقصر سورة؟",options:["الكوثر","الإخلاص","الفلق"],a:"الكوثر"},
{q:"النبي الذي ابتلعه الحوت؟",options:["يونس","أيوب","هود"],a:"يونس"},
{q:"النبي الذي كلمه الله؟",options:["موسى","إبراهيم","نوح"],a:"موسى"},
{q:"أول معركة في الإسلام؟",options:["بدر","أحد","الخندق"],a:"بدر"},
{q:"مؤذن الرسول؟",options:["بلال","خالد","عمار"],a:"بلال"},
{q:"كم جزء في القرآن؟",options:["30","25","40"],a:"30"},
{q:"قبلة المسلمين الأولى؟",options:["المسجد الأقصى","الكعبة","قباء"],a:"المسجد الأقصى"},
{q:"النبي الذي بنى السفينة؟",options:["نوح","إبراهيم","لوط"],a:"نوح"}

],

geo:[

{q:"ما عاصمة فرنسا؟",options:["باريس","روما","مدريد"],a:"باريس"},
{q:"ما عاصمة اليابان؟",options:["طوكيو","سيول","بكين"],a:"طوكيو"},
{q:"ما عاصمة إيطاليا؟",options:["روما","ميلان","تورينو"],a:"روما"},
{q:"ما عاصمة مصر؟",options:["القاهرة","الإسكندرية","الجيزة"],a:"القاهرة"},
{q:"ما عاصمة تركيا؟",options:["أنقرة","إسطنبول","إزمير"],a:"أنقرة"},
{q:"ما عاصمة ألمانيا؟",options:["برلين","ميونخ","هامبورغ"],a:"برلين"},
{q:"ما عاصمة الصين؟",options:["بكين","شنغهاي","هونغ كونغ"],a:"بكين"},
{q:"ما عاصمة البرازيل؟",options:["برازيليا","ريو","ساو باولو"],a:"برازيليا"},
{q:"ما عاصمة كندا؟",options:["أوتاوا","تورونتو","فانكوفر"],a:"أوتاوا"},
{q:"ما عاصمة أستراليا؟",options:["كانبرا","سيدني","ملبورن"],a:"كانبرا"},
{q:"أكبر دولة في العالم؟",options:["روسيا","كندا","الصين"],a:"روسيا"},
{q:"أطول نهر؟",options:["النيل","الأمازون","الدانوب"],a:"النيل"},
{q:"أكبر قارة؟",options:["آسيا","أفريقيا","أوروبا"],a:"آسيا"},
{q:"أصغر قارة؟",options:["أستراليا","أوروبا","أمريكا"],a:"أستراليا"},
{q:"أعلى جبل؟",options:["إيفرست","كي2","مونت بلان"],a:"إيفرست"}

],

general:[

{q:"كم عدد أيام السنة؟",options:["365","360","366"],a:"365"},
{q:"كم عدد القارات؟",options:["7","6","5"],a:"7"},
{q:"أسرع حيوان بري؟",options:["الفهد","الأسد","النمر"],a:"الفهد"},
{q:"كم حرف في الإنجليزية؟",options:["26","24","28"],a:"26"},
{q:"كم يوم في الأسبوع؟",options:["7","6","5"],a:"7"},
{q:"كم شهر في السنة؟",options:["12","10","11"],a:"12"},
{q:"كم دقيقة في الساعة؟",options:["60","30","90"],a:"60"},
{q:"كم ثانية في الدقيقة؟",options:["60","30","120"],a:"60"},
{q:"أكبر كوكب؟",options:["المشتري","الأرض","المريخ"],a:"المشتري"},
{q:"كوكب نعيش عليه؟",options:["الأرض","المريخ","الزهرة"],a:"الأرض"},
{q:"أكبر حيوان؟",options:["الحوت الأزرق","الفيل","القرش"],a:"الحوت الأزرق"},
{q:"أكبر طائر؟",options:["النعامة","الصقر","الحمام"],a:"النعامة"}

]

};

let currentCategory;
let currentQuestion;

function startGame(cat){

currentCategory = cat;

document.getElementById("categories").style.display="none";
document.getElementById("game").style.display="flex";

nextQuestion();

}

function nextQuestion(){

let list = questions[currentCategory];
currentQuestion = list[Math.floor(Math.random()*list.length)];

document.getElementById("question").innerText=currentQuestion.q;
document.getElementById("options").innerHTML="";
document.getElementById("answer").style.display="none";

}

function showOptions(){

let html="";

currentQuestion.options.forEach(opt=>{
html+=`<div class="option">${opt}</div>`;
});

document.getElementById("options").innerHTML=html;

}

function showAnswer(){

let a=document.getElementById("answer");
a.innerText="الإجابة: "+currentQuestion.a;
a.style.display="block";

}

</script>

</body>
</html>
